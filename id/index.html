                <input type="text" id="event-search-input" class="search-input" placeholder="Cari acara..." data-i18n="ui.search_placeholder">

        </section>

        <!-- Upcoming Events -->
        <section class="section" id="upcoming">
            <h2 class="section-title" data-i18n="ui.upcoming_events">Acara Mendatang</h2>
            <div id="upcoming-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Trending -->
        <section class="section" id="trending">
            <h2 class="section-title" data-i18n="ui.trending_events">Sedang Tren</h2>
            <div id="trending-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Popular locally (Placeholder for specific logic later) -->
        <section class="section" id="local">
            <h2 class="section-title" data-i18n="ui.popular_in_country">Populer di wilayah Anda</h2>
            <div id="local-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <div class="create-banner">
            <h2 class="section-title" data-i18n="ui.create_your_own">Buat hitung mundur Anda sendiri</h2>
            <a href="/id/create-live" class="btn btn-primary" data-i18n="ui.create_cta">Mulai</a>
        </div>

        <!-- Personal Event Templates -->
        <section class="section" id="personal-templates">
            <h2 class="section-title" data-i18n="ui.personal_templates_title">Templat Pribadi</h2>
            <p class="section-desc" data-i18n="ui.personal_templates_desc">Pilih templat indah untuk perayaan pribadi Anda dan sesuaikan dalam hitungan detik.</p>
            <div id="personal-templates-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
