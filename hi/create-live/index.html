<!DOCTYPE html>
<html lang="hi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइव बनाएं - Dayzo</title>
    <link rel="canonical" href="https://dayzo.com/hi/create-live/">
    <link rel="alternate" hreflang="en" href="https://dayzo.com/en/create-live/">
    <link rel="alternate" hreflang="es" href="https://dayzo.com/es/create-live/">
    <link rel="alternate" hreflang="pt" href="https://dayzo.com/pt/create-live/">
    <link rel="alternate" hreflang="fr" href="https://dayzo.com/fr/create-live/">
    <link rel="alternate" hreflang="de" href="https://dayzo.com/de/create-live/">
    <link rel="alternate" hreflang="ar" href="https://dayzo.com/ar/create-live/">
    <link rel="alternate" hreflang="hi" href="https://dayzo.com/hi/create-live/">
    <link rel="alternate" hreflang="id" href="https://dayzo.com/id/create-live/">
    <link rel="alternate" hreflang="zh" href="https://dayzo.com/zh/create-live/">
    <link rel="alternate" hreflang="x-default" href="https://dayzo.com/en/create-live/">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    
    <link rel="stylesheet" href="/css/create-live.css">
    <script type="module" src="/js/core/theme.js"></script>
    <script type="module" src="/js/core/lang-switcher.js"></script>
</head>
<body>
    <header class="brand-header">
        <a href="/hi/" class="brand-logo">Dayzo</a>
        <div class="header-actions">
            <select id="lang-switcher" class="lang-switcher"></select>
            <button id="theme-toggle" class="theme-toggle-btn">☀️ / 🌙</button>
        </div>
    </header>
    <main class="container">
        <div class="create-form-container">
            <h1 class="section-title" data-i18n="ui.form_header">लाइव उलटी गिनती उत्पन्न करें</h1>
            <form id="create-live-form">
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_title">आयोजन का शीर्षक</label>
                    <input type="text" id="c-title" class="form-input" placeholder="e.g. Apple Keynote" data-i18n="ui.placeholder_event">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_template">टेम्पलेट बेस</label>
                    <select id="c-template" class="form-input" style="appearance: auto;">
                        <option value="" data-i18n="ui.base_template">Base (No Template)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_date">तिथि और समय (स्थानीय)</label>
                    <input type="datetime-local" id="c-date" class="form-input" required>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_text_color">टेक्स्ट का रंग</label>
                        <input type="color" id="c-text-color" class="form-input" value="#FFFFFF" style="padding:4px; height:48px;">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_num_color">संख्याओं का रंग</label>
                        <input type="color" id="c-num-color" class="form-input" value="#FFFFFF" style="padding:4px; height:48px;">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_font_family">फ़ॉन्ट परिवार</label>
                        <select id="c-font" class="form-input" style="appearance: auto;">
                            <option value="var(--font-family-sans)" data-i18n="ui.font_modern">आधुनिक (Sans)</option>
                            <option value="'Tajawal', sans-serif" data-i18n="ui.font_arabic">अरबी (Tajawal)</option>
                            <option value="'Georgia', serif" data-i18n="ui.font_classic">क्लासिक (Serif)</option>
                            <option value="'Courier New', monospace" data-i18n="ui.font_digital">डिजिटल (Mono)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_show_qr">QR कोड दिखाएं</label>
                        <select id="c-qr" class="form-input" style="appearance: auto;">
                            <option value="true" data-i18n="ui.yes">Yes</option>
                            <option value="false" data-i18n="ui.no">No</option>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_title_size">शीर्षक फ़ॉन्ट आकार (vh)</label>
                        <input type="number" id="c-title-size" class="form-input" placeholder="5" min="1" max="20" step="0.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_num_size">संख्या का आकार (vh)</label>
                        <input type="number" id="c-num-size" class="form-input" placeholder="12" min="5" max="40" step="0.5">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_color">एक्सेन्ट कलर (Hex)</label>
                        <input type="color" id="c-color" class="form-input" value="#7C3AED" style="padding:4px; height:48px;">
                    </div>
                     <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_logo">लोगो इमेज URL</label>
                        <input type="url" id="c-logo" class="form-input" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_bg">बैकग्राउंड इमेज URL</label>
                    <input type="url" id="c-bg" class="form-input" placeholder="https://...">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_cta_text">CTA बटन टेक्स्ट</label>
                        <input type="text" id="c-cta" class="form-input" placeholder="Join Stream" data-i18n="ui.placeholder_cta">
                    </div>
                     <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_link">CTA/लाइव लिंक URL</label>
                        <input type="url" id="c-link" class="form-input" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_video">YouTube/एम्बेड वीडियो URL</label>
                    <input type="url" id="c-video" class="form-input" placeholder="YouTube URL" data-i18n="ui.placeholder_video">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" id="btn-preview" data-i18n="ui.btn_preview_live">Preview</button>
                    <button type="button" class="btn btn-secondary" id="btn-copy" data-i18n="ui.btn_copy_link">लिंक कॉपी करें</button>
                </div>
            </form>
            <div class="preview-card" style="margin-top: 32px; padding: 24px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-color); display: none;" id="live-preview-container">
                <h3 style="margin-bottom: 16px; font-size: 1rem; opacity: 0.7; text-transform: uppercase;" data-i18n="ui.live_preview">Live Preview</h3>
                <iframe id="preview-iframe" style="width: 100%; height: 400px; border: none; border-radius: var(--radius-md); background: #000;"></iframe>
            </div>
            <div class="result-section" id="result-section">
                <div class="generated-url-box" id="generated-url"></div>
            </div>
        </div>
    </main>
    <script type="module" src="/js/pages/create-live.js"></script>
</body>
</html>
