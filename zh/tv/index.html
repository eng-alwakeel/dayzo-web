<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dayzo TV</title>
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dayzo.com/zh/tv/">
    <meta property="og:title" content="Dayzo TV Display">
    <meta property="og:description" content="Cast your countdown perfectly on any large screen or TV.">
    <meta property="og:image" content="https://dayzo.com/img/social-preview.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Dayzo TV Display">
    <meta name="twitter:description" content="Cast your countdown perfectly on any large screen or TV.">
    
    <link rel="canonical" href="https://dayzo.com/zh/tv/">
    <link rel="alternate" hreflang="en" href="https://dayzo.com/en/tv/">
    <link rel="alternate" hreflang="es" href="https://dayzo.com/es/tv/">
    <link rel="alternate" hreflang="pt" href="https://dayzo.com/pt/tv/">
    <link rel="alternate" hreflang="fr" href="https://dayzo.com/fr/tv/">
    <link rel="alternate" hreflang="de" href="https://dayzo.com/de/tv/">
    <link rel="alternate" hreflang="ar" href="https://dayzo.com/ar/tv/">
    <link rel="alternate" hreflang="hi" href="https://dayzo.com/hi/tv/">
    <link rel="alternate" hreflang="id" href="https://dayzo.com/id/tv/">
    <link rel="alternate" hreflang="zh" href="https://dayzo.com/zh/tv/">
    <link rel="alternate" hreflang="x-default" href="https://dayzo.com/en/tv/">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    
    <link rel="stylesheet" href="/css/tv.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
    <script type="module" src="/js/core/theme.js"></script>
</head>
<body class="mode-tv">
    <div class="tv-background" id="tv-bg"></div>
    <div class="tv-overlay"></div>
    
    <div class="tv-container">
        <header class="tv-branding">
            <div class="brand-logo">Dayzo <span>LIVE</span></div>
        </header>

        <main class="tv-content">
            <h1 class="tv-title" id="tv-title">Loading...</h1>
            
            <div class="tv-countdown-wrap" id="tv-countdown-wrap">
                <div class="tv-segment"><span class="tv-num" id="tv-days">00</span><span class="tv-label" data-i18n="ui.days">天</span></div>
                <div class="tv-segment"><span class="tv-num" id="tv-hours">00</span><span class="tv-label" data-i18n="ui.hours">小时</span></div>
                <div class="tv-segment"><span class="tv-num" id="tv-minutes">00</span><span class="tv-label" data-i18n="ui.minutes">分钟</span></div>
                <div class="tv-segment"><span class="tv-num" id="tv-seconds">00</span><span class="tv-label" data-i18n="ui.seconds">秒</span></div>
            </div>

            <div class="tv-final-10" id="tv-final-10" style="display:none;">
                <span class="tv-final-num" id="tv-final-num">10</span>
            </div>

            <div class="tv-finished-text" id="tv-finished-text" style="display:none;" data-i18n="ui.its_live">活动进行中！</div>
        </main>

        <footer class="tv-footer">
             <div class="tv-qr-region">
                <canvas id="tv-qr-canvas" width="100" height="100"></canvas>
                <div class="tv-qr-text">
                  <span data-i18n="ui.qr_placeholder">扫描在手机上查看</span>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Hidden theme toggle just in case -->
    <button id="theme-toggle-hidden" style="display:none;"></button>
    
    <script type="module" src="/js/pages/tv.js"></script>
</body>
</html>
