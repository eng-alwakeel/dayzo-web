<body>
    
    <header class="brand-header">
        <a href="/de/" class="brand-logo">Dayzo</a>
        <div class="header-actions">
            <select id="lang-switcher" class="lang-switcher"></select>
            <button id="theme-toggle" class="theme-toggle-btn">☀️ / 🌙</button>
        </div>
    </header>
    

    <main class="container" id="app-root">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="local-clock" id="base-clock">--:--:--</h1>
            <div class="search-container">
                <input type="text" id="event-search-input" class="search-input" placeholder="Ereignisse suchen..." data-i18n="ui.search_placeholder">
                <div id="search-results-grid" class="events-grid" style="margin-top: 24px;"></div>
            </div>
        </section>

        <!-- Upcoming Events -->
        <section class="section" id="upcoming">
            <h2 class="section-title" data-i18n="ui.upcoming_events">Kommende Ereignisse</h2>
            <div id="upcoming-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <div class="ad-unit">
          <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- Trending -->
        <section class="section" id="trending">
            <h2 class="section-title" data-i18n="ui.trending_events">Angesagt</h2>
            <div id="trending-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <div class="ad-unit">
          <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- Popular locally (Placeholder for specific logic later) -->
        <section class="section" id="local">
            <h2 class="section-title" data-i18n="ui.popular_in_country">Beliebt in deiner Region</h2>
            <div id="local-events-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>

        <div class="create-banner">
            <h2 class="section-title" data-i18n="ui.create_your_own">Erstelle deinen eigenen Countdown</h2>
            <a href="/de/create-live" class="btn btn-primary" data-i18n="ui.create_cta">Jetzt Starten</a>
        </div>

        <!-- Personal Event Templates -->
        <section class="section" id="personal-templates">
            <h2 class="section-title" data-i18n="ui.personal_templates_title">Persönliche Vorlagen</h2>
            <p class="section-desc" data-i18n="ui.personal_templates_desc">Wähle eine schöne Vorlage für deine persönliche Feier und passe sie in Sekunden an.</p>
            <div id="personal-templates-grid" class="events-grid">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>
    
    <script type="module" src="/js/pages/homepage.js"></script>
