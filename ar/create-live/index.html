<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حدث مباشر - Dayzo</title>
    <link rel="canonical" href="https://dayzo.com/ar/create-live/">
    <link rel="alternate" hreflang="en" href="https://dayzo.com/en/create-live/">
    <link rel="alternate" hreflang="es" href="https://dayzo.com/es/create-live/">
    <link rel="alternate" hreflang="pt" href="https://dayzo.com/pt/create-live/">
    <link rel="alternate" hreflang="fr" href="https://dayzo.com/fr/create-live/">
    <link rel="alternate" hreflang="de" href="https://dayzo.com/de/create-live/">
    <link rel="alternate" hreflang="ar" href="https://dayzo.com/ar/create-live/">
    <link rel="alternate" hreflang="hi" href="https://dayzo.com/hi/create-live/">
    <link rel="alternate" hreflang="id" href="https://dayzo.com/id/create-live/">
    <link rel="alternate" hreflang="zh" href="https://dayzo.com/zh/create-live/">
    <link rel="alternate" hreflang="x-default" href="https://dayzo.com/en/create-live/">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/rtl.css">
    <link rel="stylesheet" href="/css/create-live.css">
    <script type="module" src="/js/core/theme.js"></script>
    <script type="module" src="/js/core/lang-switcher.js"></script>
</head>
<body>
    <header class="brand-header">
        <a href="/ar/" class="brand-logo">Dayzo</a>
        <div class="header-actions">
            <select id="lang-switcher" class="lang-switcher"></select>
            <button id="theme-toggle" class="theme-toggle-btn">☀️ / 🌙</button>
        </div>
    </header>
    <main class="container">
        <div class="create-layout">
          <div class="create-form-container">
            <h1 class="section-title" data-i18n="ui.form_header">إنشاء عداد بث مباشر</h1>
            <form id="create-live-form">
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_title">عنوان الحدث</label>
                    <input type="text" id="c-title" class="form-input" placeholder="مثال: مؤتمر آبل" data-i18n="ui.placeholder_event">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_template">القالب</label>
                    <select id="c-template" class="form-input" style="appearance: auto;">
                        <option value="" data-i18n="ui.base_template">أساسي (بدون قالب)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_date">التاريخ والوقت (محلي)</label>
                    <input type="datetime-local" id="c-date" class="form-input" required>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_text_color">لون النص</label>
                        <input type="color" id="c-text-color" class="form-input" value="#FFFFFF" style="padding:4px; height:48px;">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_num_color">لون الأرقام</label>
                        <input type="color" id="c-num-color" class="form-input" value="#FFFFFF" style="padding:4px; height:48px;">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_font_family">نوع الخط</label>
                        <select id="c-font" class="form-input" style="appearance: auto;">
                            <option value="var(--font-family-sans)" data-i18n="ui.font_modern">عصري (Sans)</option>
                            <option value="'Tajawal', sans-serif" data-i18n="ui.font_arabic">عربي (تجوال)</option>
                            <option value="'Georgia', serif" data-i18n="ui.font_classic">كلاسيكي (نصي)</option>
                            <option value="'Courier New', monospace" data-i18n="ui.font_digital">رقمي (Mono)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_show_qr">إظهار رمز QR</label>
                        <select id="c-qr" class="form-input" style="appearance: auto;">
                            <option value="true" data-i18n="ui.yes">نعم</option>
                            <option value="false" data-i18n="ui.no">لا</option>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_title_size">حجم خط العنوان (vh)</label>
                        <input type="number" id="c-title-size" class="form-input" placeholder="5" min="1" max="20" step="0.5">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_num_size">حجم الأرقام (vh)</label>
                        <input type="number" id="c-num-size" class="form-input" placeholder="12" min="5" max="40" step="0.5">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_color">اللون الرئيسي (Hex)</label>
                        <input type="color" id="c-color" class="form-input" value="#7C3AED" style="padding:4px; height:48px;">
                    </div>
                     <div class="form-group">
                        <label class="form-label"><span data-i18n="ui.form_logo">رابط الشعار</span> <a href="https://imgbb.com" target="_blank" rel="noopener" class="upload-hint">↑ رفع</a></label>
                        <input type="url" id="c-logo" class="form-input" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label"><span data-i18n="ui.form_bg">رابط صورة الخلفية</span> <a href="https://imgbb.com" target="_blank" rel="noopener" class="upload-hint">↑ رفع</a></label>
                    <input type="url" id="c-bg" class="form-input" placeholder="https://...">
                    <span class="field-hint">تحتاج رابط صورة؟ ارفعها على <a href="https://imgbb.com" target="_blank" rel="noopener">imgbb.com</a> ← انقر على الصورة ← انسخ <strong>الرابط المباشر</strong> ← الصق هنا.</span>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_cta_text">نص الزر (CTA)</label>
                        <input type="text" id="c-cta" class="form-input" placeholder="انضم للبث الآن" data-i18n="ui.placeholder_cta">
                    </div>
                     <div class="form-group">
                        <label class="form-label" data-i18n="ui.form_link">رابط الزر</label>
                        <input type="url" id="c-link" class="form-input" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="ui.form_video">رابط فيديو التضمين (يوتيوب)</label>
                    <input type="url" id="c-video" class="form-input" placeholder="رابط تضمين يوتيوب" data-i18n="ui.placeholder_video">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" id="btn-preview" data-i18n="ui.btn_preview_live">معاينة البث</button>
                    <button type="button" class="btn btn-secondary" id="btn-copy" data-i18n="ui.btn_copy_link">نسخ الرابط</button>
                </div>
            </form>
            <div class="result-section" id="result-section">
                <div class="generated-url-box" id="generated-url"></div>
            </div>
          </div>

          <!-- Sticky Preview Panel -->
          <div class="create-preview-panel">
            <div class="preview-panel-label" data-i18n="ui.live_preview">معاينة البث المباشر</div>
            <div id="live-preview-container" class="preview-iframe-wrap">
              <div class="preview-placeholder" id="preview-placeholder">
                <span>👆</span>
                <p data-i18n="ui.preview_hint">Fill the form to see a live preview</p>
              </div>
              <iframe id="preview-iframe" style="display:none; width:100%; height:100%; border:none; border-radius: var(--radius-md); background:#000;"></iframe>
            </div>
          </div>
        </div>
    </main>
    <script type="module" src="/js/pages/create-live.js"></script>
</body>
</html>
